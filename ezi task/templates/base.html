{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EziTask</title>
    <!-- <link rel="stylesheet" type="css/text" href="{% static 'css/style1.css' % }">-->
    <style>
        body {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

.container {
    margin: 0;
    padding: 0;
    background: #868686;
    position: absolute;
    top: 100px;
    left: 25%;
    height: calc(100vh - 100px);
    width: 40vw;
    text-align: center;
}

.container div {
    margin: auto;
    padding: 10px 30px 10px 30px;
    background-color: blueviolet;
    height: fit-content;
}

.container span {
    margin: auto;
    padding: 10px 30px 10px 30px;
    height: fit-content;
    display: flex;
}

.container span h2{
    padding: 10px;
    height: fit-content;
}

.container span label {
    margin: 10px;
}

.container span input{
    padding: 10px;
    width: 100%;
    height: fit-content;
}

nav {
    height: 100px;
    width: 100vw;
    background-color: blue;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 50;
    display: flex;
    justify-content: space-around;
}

nav div.authentication, nav div.title {
    transform: translateY(20%);
}

nav a {
    text-decoration: none;
    color: black;
}

img {
    height: 200px;
    width: 200px;
}
    </style>

</head>



<body>
    <nav>
        <div class="title">
            <h2>EziTask</h2>
        </div>
        <div class="authentication">
            {% block authentication %}
            <a href="#">Signin</a>
            <a href="#">Signout</a>
            <a href="#">Sugnup</a>
            {% endblock %}
            
        </div>
    </nav>
    <div class="container">
        {% block content %}
        <div>Signin</div>
        <div>Signup</div>
        {% endblock %}

</body>
</html>
